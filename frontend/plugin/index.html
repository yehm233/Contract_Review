<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contract Review Pro</title>
  <style>
    :root {
      --primary: #4f46e5;
      --high: #ef4444;
      --high-bg: #fef2f2;
      --medium: #f59e0b;
      --medium-bg: #fffbeb;
      --low: #22c55e;
      --low-bg: #f0fdf4;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      padding: 12px 14px; font-size: 13px; color: var(--text); background: #f8fafc;
    }

    .header-bar {
      display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
      padding-bottom: 10px; border-bottom: 1px solid var(--border);
    }
    .header-bar h3 { font-size: 15px; font-weight: 600; }
    .header-bar .icon { font-size: 18px; }

    .section { margin-bottom: 14px; }
    .section-label {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px;
    }

    textarea {
      width: 100%; height: 80px; padding: 8px 10px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 12px; font-family: inherit; resize: vertical;
      line-height: 1.5; color: var(--text); background: #fff;
    }
    textarea:focus { outline: none; border-color: var(--primary); }

    .btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 9px 16px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }
    .btn-secondary {
      background: #fff; color: var(--primary); border: 1.5px solid var(--primary);
    }
    .btn-secondary:hover { background: #eef2ff; }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-msg { font-size: 11px; color: var(--text-muted); margin-top: 6px; text-align: center; }

    /* Result cards */
    .findings-container { margin-top: 12px; }
    .card {
      background: #fff; border-radius: 8px; padding: 10px 12px;
      margin-bottom: 8px; border: 1px solid var(--border); border-left: 3px solid #cbd5e1;
    }
    .card.high { border-left-color: var(--high); }
    .card.medium { border-left-color: var(--medium); }
    .card.low { border-left-color: var(--low); }
    .card-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;
    }
    .card-title { font-size: 12px; font-weight: 600; }
    .severity-tag {
      padding: 1px 8px; border-radius: 10px; font-size: 10px; font-weight: 700;
    }
    .severity-tag.high { background: var(--high-bg); color: var(--high); }
    .severity-tag.medium { background: var(--medium-bg); color: #b45309; }
    .severity-tag.low { background: var(--low-bg); color: #15803d; }
    .card-body { font-size: 11px; color: var(--text-secondary); line-height: 1.5; }
    .card-body .field { margin-bottom: 4px; }
    .card-body .label { font-weight: 600; color: var(--text); }
    .card-action { margin-top: 8px; }
    .btn-adopt {
      width: 100%; padding: 6px 12px; border: 1px solid #bbf7d0; border-radius: 6px;
      background: var(--low-bg); color: #15803d; font-size: 11px; font-weight: 600;
      cursor: pointer; transition: all .15s;
    }
    .btn-adopt:hover { background: #dcfce7; }
    .btn-adopt:disabled { background: #f0fdf4; color: #86efac; cursor: not-allowed; }

    .summary-block {
      background: #fff; border-radius: 8px; padding: 10px 12px;
      margin-bottom: 10px; border: 1px solid var(--border);
    }
    .summary-block .risk-overall {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px;
    }
    .summary-block .desc { font-size: 11px; color: var(--text-secondary); line-height: 1.5; }

    .divider { height: 1px; background: var(--border); margin: 12px 0; }

    .empty-state {
      text-align: center; padding: 24px 12px; color: var(--text-muted);
    }
    .empty-state .icon { font-size: 32px; margin-bottom: 8px; }
    .empty-state p { font-size: 12px; }
  </style>
</head>
<body>
  <div class="header-bar">
    <span class="icon">&#9878;</span>
    <h3>合同审查</h3>
  </div>

  <div class="section">
    <div class="section-label">合同文本</div>
    <textarea id="contractText" placeholder="粘贴合同文本，或从文档中复制..."></textarea>
  </div>

  <button class="btn btn-primary" id="startBtn">
    <span>&#128269;</span> 开始审查
  </button>
  <div class="status-msg" id="statusMsg"></div>

  <div class="divider"></div>

  <div id="result">
    <div class="empty-state">
      <div class="icon">&#128203;</div>
      <p>输入合同文本并点击"开始审查"<br>审查结果将在此显示</p>
    </div>
  </div>

  <script src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.js"></script>
  <script src="app.js"></script>
</body>
</html>
